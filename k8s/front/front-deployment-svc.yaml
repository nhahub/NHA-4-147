---
apiVersion: v1
kind: Service
metadata:
  name: front-svc
  namespace: front-proj-ns
  labels:
    app : mern-front-svc
spec:
  ports:
    - targetPort: 3000
      port: 3000
      nodePort: 30019
  type: NodePort
  selector:
    app: ecommerce
    type: front-end

---
 
apiVersion: apps/v1

kind: Deployment

metadata:
  name: front-deployment
  namespace: front-proj-ns
  labels:
    app: ecommerce-front-deploy
    

spec:
  replicas: 2
  selector:
    matchLabels:
      app: ecommerce
      type: front-end

  template:
    metadata:
      name: front-ecommerce-pod
      labels:
        app: ecommerce
        type: front-end

    spec:
      containers:
      - name: front-ecommerce-container
        image: abdulrahman011/devops_comprehensive_project_depi_front_svc
        ports: 
        - containerPort: 3000

        env:
            - name: REACT_APP_BASE_URL
              value: "http://192.168.163.136:30012"
              # value: "http://back-svc.back-proj-ns.svc.cluster.local:30012"




        
