apiVersion: v1
kind: PersistentVolume
metadata:
  name: mongo-pv-mo-1
  namespace: mongodb-proj-ns

spec:
  capacity:
    storage: 2Gi

  accessModes:
    - ReadWriteOnce

  persistentVolumeReclaimPolicy: Retain

  hostPath:
    path: /mnt/data/mongo-1
    
---
