---
apiVersion: v1
kind: Service
metadata:
  name: back-svc
  namespace: back-proj-ns
  labels:
    app : mern-back-svc
spec:
  ports:
    - targetPort: 8000
      port: 8000
      nodePort: 30012
  type: NodePort
  selector:
    app: ecommerce
    type: back-end

---
 
apiVersion: apps/v1

kind: Deployment

metadata:
  name: back-deployment
  namespace: back-proj-ns
  labels:
    app: ecommerce-back-deploy
    

spec:
  replicas: 2
  selector:
    matchLabels:
      app: ecommerce
      type: back-end

  template:
    metadata:
      name: back-ecommerce-pod
      labels:
        app: ecommerce
        type: back-end

    spec:
      initContainers:
      - name: wait-for-mongodb
        image: mongo:7
      
        command:
            - /bin/sh
            - -c
            - |
              MONGO_HOST="db-ss-0.mongo-svc-headless.mongodb-proj-ns.svc.cluster.local:27017"

              echo "Waiting for MongoDB primary..."
              until mongosh "$MONGO_HOST" \
                -u root \
                -p example \
                --authenticationDatabase admin \
                --quiet \
                --eval 'db.runCommand({isMaster:1}).ismaster' 2>/dev/null | grep -q "true"; do
                echo "No primary yet, retrying in 5s..."
                sleep 5
              done
              echo "MongoDB primary is ready."

      containers:
      - name: back-ecommerce-container
        image: abdulrahman011/devops_comprehensive_project_depi_back_svc:v23
        ports: 
        - containerPort: 8000
        
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

        env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: back-secret 
                  key: MONGO_URI

            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: back-secret 
                  key: SECRET_KEY
            - name: ORIGIN
              valueFrom:
                secretKeyRef:
                  name: back-secret 
                  key: ORIGIN
            - name: EMAIL
              valueFrom:
                secretKeyRef:
                  name: back-secret 
                  key: EMAIL

            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: back-secret 
                  key: PASSWORD
            
            - name: LOGIN_TOKEN_EXPIRATION
              valueFrom:
                secretKeyRef:
                  name: back-secret 
                  key: LOGIN_TOKEN_EXPIRATION

            - name: OTP_EXPIRATION_TIME
              valueFrom:
                secretKeyRef:
                  name: back-secret 
                  key: OTP_EXPIRATION_TIME

            - name: PASSWORD_RESET_TOKEN_EXPIRATION
              valueFrom:
                secretKeyRef:
                  name: back-secret 
                  key: PASSWORD_RESET_TOKEN_EXPIRATION
            - name: COOKIE_EXPIRATION_DAYS
              valueFrom:
                secretKeyRef:
                  name: back-secret 
                  key: COOKIE_EXPIRATION_DAYS
            - name: PRODUCTION
              valueFrom:
                secretKeyRef:
                  name: back-secret 
                  key: PRODUCTION


        
