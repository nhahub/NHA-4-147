---
- name: k8s-cluster-setup 
  hosts: all
  strategy: linear

  vars_files:
    - ./required_modules.yaml
 

 # we can use blocks and make condition using the ansible facts or magic varibales  based on the host group 

  tasks: 
  - name: common tasks for both master and workers ( pre configuration for linux )
    block:

        # - name: Update /etc/hosts 
        #   lineinfile: 
        #     path:  /etc/hosts
        #     line: "{{  hostvars['k8s_master']['ansible_facts']['default_ipv4']['address'] }}  k8s-master"  ## work 
        #     state: present

        # - name: Update /etc/hosts 
        #   lineinfile: 
        #     path:  /etc/hosts
        #     line: "{{  hostvars[groups['k8s_control_plane'][0]]['ansible_facts']['default_ipv4']['address'] }}  k8s-master"   # this also works 
        #     state: present




        - name: Set hostname on workers
          ansible.builtin.hostname:
            name: "{{ inventory_hostname }}"

        - name: Update /etc/hosts with all cluster nodes
          lineinfile:
            path: /etc/hosts
            line: "{{ hostvars[item]['ansible_facts']['default_ipv4']['address'] }}  {{ item }}"
            state: present
          loop: "{{ groups['k8s_cluster'] }}"


        - name: Add worker hostname to its own /etc/hosts
          lineinfile:
            path: /etc/hosts
            line: "127.0.0.1  {{ inventory_hostname }}"
            state: present
          when: inventory_hostname in groups['k8s_workers']



        - name: Install Kernel Headers on Master Node
          yum: 
            name: "kernel-devel"
            state: present
            update_cache: true
          
          
        - name:  Load Kernel Modules
          community.general.modprobe:
            name: "{{ item }}"
            state: present
            persistent: present
          loop: "{{ loaded_kernel_modules }}"

        - name: Configure sysctl for Kubernetes networking
          copy: 
            src: ./sysctl_k8s_conf
            dest: /etc/sysctl.d/kubernetes.conf
          notify: reload sysctl
          
        - name: Apply sysctl settings immediately
          ansible.builtin.command:
            cmd: sysctl --system
          changed_when: false

        - name: Remove swap from fstab
          lineinfile:
            path: /etc/fstab
            regexp: '.*swap.*'
            state: absent

        - name: Disable swap
          shell: 
            cmd: swapoff -a
    

        # Configure Firewall and SELinux
        - name: disable Firewall
          service:
            name: firewalld
            state: stopped
            enabled: false

        - name: Put SELinux in permissive mode, logging actions that would be blocked.
          ansible.posix.selinux:
            policy: targeted
            state: permissive
    when:  inventory_hostname in groups['k8s_cluster']
    tags: k8s-master-worker-pre-config-linux
  
  # install and run containerd as service 
  - name: install containerd  
    block: 

    - name: Add Docker repository
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/centos/docker-ce.repo
        dest: /etc/yum.repos.d/docker-ce.repo
        mode: '0644'

    - name: Install containerd
      yum: 
        name: containerd.io
        state: present
        update_cache: true

    - name: Create containerd configuration directory
      ansible.builtin.file:
        path: /etc/containerd
        state: directory
        mode: '0755'


    - name: create config file 
      shell : 
        cmd: "containerd config default > /etc/containerd/config.toml"
     

    - name:   Enable SystemdCgroup in containerd
      ansible.builtin.lineinfile:
        path: /etc/containerd/config.toml
        regexp: '(\s+)SystemdCgroup = false'
        line: '\1SystemdCgroup = true'
        backrefs: yes

      # Configure containerd
    - name: enable containerd service
      service:
          name: containerd.service
          state: started    
          enabled: true

    when:  inventory_hostname in groups['k8s_cluster']
    tags: k8s-master-worker-containerd


# Install Kubernetes packages

  - name: download k8s componetnent 
    block:  
    - name: copy / create k8s yum repo 
      copy: 
        src: ./kubernetes.repo
        dest: /etc/yum.repos.d/kubernetes.repo




    - name: Update DNF metadata cache
      ansible.builtin.command:
        cmd: dnf makecache
      changed_when: false



    - name: Install kubeadm & kubectl & kubelet
      yum: 
        name: 
        - kubelet  
        - kubeadm 
        - kubectl 
        state: present
        disable_excludes: "kubernetes"
        update_cache: true


    - name: enable kubelet service
      service:
          name: kubelet.service
          state: started
          enabled: true



    - name: Install conntrack
      yum: 
        name: conntrack   
        state: present
        update_cache: true

    when:  inventory_hostname in groups['k8s_cluster']
    tags: k8s-master-worker-componetnent 

  - name: Check if cluster is already initialized
    ansible.builtin.stat:
      path: /etc/kubernetes/admin.conf
    register: kubeadm_init
    when: 
    - inventory_hostname in groups['k8s_control_plane']

  - name: Generate join command
    ansible.builtin.command: kubeadm token create --print-join-command
    register: join_command
    when: 
    - inventory_hostname in groups['k8s_control_plane']
  - name: Save join command
    ansible.builtin.set_fact:
         k8s_join_command: "{{ join_command.stdout }}"
    when: 
    - inventory_hostname in groups['k8s_control_plane']



  - name: Tasks for k8s master 
    block:      
    
    - name: init cluster
      ansible.builtin.command:
        cmd: kubeadm init
      register: init_output
      when: not kubeadm_init.stat.exists



    - name: create .kube_dir for root
      file:
        path: /root/.kube
        state: directory
        mode: '0755'
    


    - name: Copy a "admin.conf" file 
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: /root/.kube/config
        owner: root
        group: root  
        remote_src: yes
        mode: '0600'


## required to wait for api server to be ready 
    - name: Wait for API server to be ready
      ansible.builtin.wait_for:
        host: localhost
        port: 6443
        timeout: 120
      

    - name: install CNI calico in  cluster
      ansible.builtin.command:
        cmd: "kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.27.0/manifests/calico.yaml " 
      

    - name: Wait for control plane pods to be ready
      ansible.builtin.command:
        cmd: kubectl get pods -n kube-system -o json
      register: kube_pods
      until: >
        (kube_pods.stdout | from_json).items |
        selectattr('status.phase', 'equalto', 'Running') | list | length >= 4

      retries: 30
      delay: 10
      
      
    - name: Generate join command
      ansible.builtin.command: kubeadm token create --print-join-command
      register: join_command

    - name: Save join command
      ansible.builtin.set_fact:
         k8s_join_command: "{{ join_command.stdout }}"

    when: 
    - inventory_hostname in groups['k8s_control_plane'] 
    - not kubeadm_init.stat.exists | default(false)

    tags: k8s-master

  - name: Check if already joined
    ansible.builtin.stat:
      path: /etc/kubernetes/kubelet.conf
    register: kubelet_conf
    when: inventory_hostname in groups['k8s_workers']

  - name: Tasks for K8s workers

    block:
    - name: Join workers to cluster
      ansible.builtin.command:
        cmd:  "{{ hostvars[groups['k8s_control_plane'][0]].k8s_join_command }}"

    when: 
    - inventory_hostname in groups['k8s_workers']
    - not kubelet_conf.stat.exists | default(false)

    tags: k8s-workers




  - name: verify k8s cluster 
    block: 
    - name: Get cluster nodes
      ansible.builtin.command: kubectl get nodes -o wide
      register: cluster_nodes
      changed_when: false

    - name: Display cluster status
      ansible.builtin.debug:
        msg: "{{ cluster_nodes.stdout_lines }}" 
    
    - name: Get cluster component status
      ansible.builtin.command: kubectl get pods -n kube-system
      register: system_pods
      changed_when: false

    - name: Display system pods
      ansible.builtin.debug:
        msg: "{{ system_pods.stdout_lines }}"


    tags: verify k8s cluster running 
    when: 
    - inventory_hostname in groups['k8s_control_plane'] 

    




