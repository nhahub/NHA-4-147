---
- name: Add grafana Helm repo
  ansible.builtin.command:
    cmd: helm repo add grafana {{ loki_stack_repo_url }}

- name: Update Helm repos
  ansible.builtin.command:
    cmd: helm repo update
  changed_when: false

- name: Render loki-stack values from template
  ansible.builtin.template:
    src: loki-stack-values.yaml.j2
    dest: /tmp/loki-stack-values.yaml
    mode: "0644"

- name: Deploy loki-stack via Helm
  ansible.builtin.command:
    cmd: >
      helm upgrade --install {{ loki_stack_release_name }} grafana/loki-stack
      --version {{ loki_stack_chart_version }}
      --namespace {{ monitoring_namespace }}
      -f /tmp/loki-stack-values.yaml

- name: Wait for Loki pods to be ready
  ansible.builtin.command:
    cmd: >
      kubectl wait pod
      --for=condition=Ready
      --all
      -n {{ monitoring_namespace }}
      --timeout=300s
  changed_when: false
  retries: 3
  delay: 30
  register: wait_result
  until: wait_result.rc == 0

- name: Display Loki access info
  ansible.builtin.debug:
    msg:
      - "Loki: http://{{ ansible_facts['default_ipv4']['address'] }}:{{ loki_nodeport }}"
      - "Promtail: running as DaemonSet on all nodes"
      - "Loki is pre-configured as datasource in Grafana"
