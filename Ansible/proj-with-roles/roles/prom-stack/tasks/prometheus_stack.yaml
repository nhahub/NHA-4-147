---
- name: Create monitoring namespace
  ansible.builtin.command:
    cmd: kubectl create namespace {{ monitoring_namespace }}
  register: ns_result
  failed_when:
    - ns_result.rc != 0
    - '"already exists" not in ns_result.stderr'
  changed_when: ns_result.rc == 0

- name: Add prometheus-community Helm repo
  ansible.builtin.command:
    cmd: helm repo add prometheus-community {{ prometheus_stack_repo_url }}

- name: Update Helm repos
  ansible.builtin.command:
    cmd: helm repo update
  changed_when: false

- name: Render prometheus-stack values from template
  ansible.builtin.template:
    src: prometheus-stack-values.yaml.j2
    dest: /tmp/prometheus-stack-values.yaml
    mode: "0644"

- name: Deploy kube-prometheus-stack via Helm
  ansible.builtin.command:
    cmd: >
      helm upgrade --install {{ prometheus_stack_release_name }} prometheus-community/kube-prometheus-stack
      --version {{ prometheus_stack_chart_version }}
      --namespace {{ monitoring_namespace }}
      -f /tmp/prometheus-stack-values.yaml

- name: Wait for Prometheus pods to be ready
  ansible.builtin.command:
    cmd: >
      kubectl wait pod
      --for=condition=Ready
      --all
      -n {{ monitoring_namespace }}
      --timeout=300s
  changed_when: false
  retries: 3
  delay: 30
  register: wait_result
  until: wait_result.rc == 0

- name: Get Public IP of the control-plane node
  ansible.builtin.uri:
    url: https://api.ipify.org
    return_content: true
  register: public_ip_result
  changed_when: false

- name: Display Prometheus stack access info
  ansible.builtin.debug:
    msg:
      - "Grafana:      http://{{ public_ip_result.content }}:{{ grafana_nodeport }}"
      - "              user: {{ grafana_admin_user }} / {{ grafana_admin_password }}"
      - "Prometheus:   http://{{ public_ip_result.content }}:{{ prometheus_nodeport }}"
      - "Alertmanager: http://{{ public_ip_result.content }}:{{ alertmanager_nodeport }}"
