---
- name: Create monitoring namespace
  ansible.builtin.command:
    cmd: kubectl create namespace {{ monitoring_namespace }}
  register: ns_result
  failed_when:
    - ns_result.rc != 0
    - '"already exists" not in ns_result.stderr'
  changed_when: ns_result.rc == 0

- name: Add prometheus-community Helm repo
  kubernetes.core.helm_repository:
    name: prometheus-community
    repo_url: "{{ prometheus_stack_repo_url }}"

- name: Update Helm repos
  ansible.builtin.command:
    cmd: helm repo update
  changed_when: false

- name: Render prometheus-stack values from template
  ansible.builtin.template:
    src: prometheus-stack-values.yaml.j2
    dest: /tmp/prometheus-stack-values.yaml
    mode: '0644'

- name: Deploy kube-prometheus-stack via Helm
  kubernetes.core.helm:
    name: "{{ prometheus_stack_release_name }}"
    chart_ref: prometheus-community/kube-prometheus-stack
    chart_version: "{{ prometheus_stack_chart_version }}"
    release_namespace: "{{ monitoring_namespace }}"
    create_namespace: false
    values_files:
      - /tmp/prometheus-stack-values.yaml
    wait: false

- name: Wait for Prometheus pods to be ready
  ansible.builtin.command:
    cmd: >
      kubectl wait pod
      --for=condition=Ready
      --all
      -n {{ monitoring_namespace }}
      --timeout=300s
  changed_when: false
  retries: 3
  delay: 30
  register: wait_result
  until: wait_result.rc == 0

- name: Display Prometheus stack access info
  ansible.builtin.debug:
    msg:
      - "Grafana:      http://{{ ansible_facts['default_ipv4']['address'] }}:{{ grafana_nodeport }}"
      - "              user: {{ grafana_admin_user }} / {{ grafana_admin_password }}"
      - "Prometheus:   http://{{ ansible_facts['default_ipv4']['address'] }}:{{ prometheus_nodeport }}"
      - "Alertmanager: http://{{ ansible_facts['default_ipv4']['address'] }}:{{ alertmanager_nodeport }}"
