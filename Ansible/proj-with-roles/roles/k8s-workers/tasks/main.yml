---
# tasks file for k8s-workers

- name: Check if already joined
  ansible.builtin.stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubelet_conf


- name: Tasks for K8s workers
  block:
    - name: Join workers to cluster
      ansible.builtin.command:
        cmd: "{{ hostvars[groups['k8s_control_plane'][0]].k8s_join_command }}"

    - name: Wait for node to be ready
      ansible.builtin.command:
        cmd: "kubectl get node {{ ansible_hostname }} -o jsonpath='{.status.conditions[?(@.type==\"Ready\")].status}'"
      register: node_status
      until: node_status.stdout == 'True'
      retries: 30
      delay: 10
      delegate_to: "{{ groups['k8s_control_plane'][0] }}"
      changed_when: false


  when:
    - not kubelet_conf.stat.exists | default(false)

  tags: k8s-workers