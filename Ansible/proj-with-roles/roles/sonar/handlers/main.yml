---
- name: reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: reload sysctl
  ansible.builtin.command: sysctl --system
  changed_when: false

- name: restart postgresql
  ansible.builtin.systemd:
    name: "{{ postgresql_service_name }}"
    state: restarted

- name: restart sonarqube
  ansible.builtin.systemd:
    name: sonarqube
    state: restarted
