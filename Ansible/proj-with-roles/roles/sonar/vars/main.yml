---
# vars file for Ansible/proj-with-roles/roles/sonar

#  PostgreSQL 
postgresql_version: "16"
postgresql_data_dir: "/var/lib/pgsql/{{ postgresql_version }}/data"
postgresql_bin_dir: "/usr/pgsql-{{ postgresql_version }}/bin"
postgresql_service: "postgresql-{{ postgresql_version }}"

# Repo RPMs  selected automatically based on detected OS
postgresql_repo_rpm_el8: "https://download.postgresql.org/pub/repos/yum/reporpms/EL-8-x86_64/pgdg-redhat-repo-latest.noarch.rpm"
postgresql_repo_rpm_el9: "https://download.postgresql.org/pub/repos/yum/reporpms/EL-9-x86_64/pgdg-redhat-repo-latest.noarch.rpm"

# Database credentials
postgresql_db_name: "sonarqube"
postgresql_db_user: "sonr"
postgresql_db_pass: "sonr"

#  SonarQube 
sonarqube_version: "9.9.0.65466"
sonarqube_download_url: "https://binaries.sonarsource.com/Distribution/sonarqube/sonarqube-{{ sonarqube_version }}.zip"
sonarqube_install_dir: "/opt/sonarqube"
sonarqube_data_dir: "/opt/sonarqube_data"
sonarqube_user: "sonarqube"
sonarqube_group: "sonarqube"

# These reference postgresql vars  keep them in sync
sonarqube_db_user: "{{ postgresql_db_user }}"
sonarqube_db_pass: "{{ postgresql_db_pass }}"
sonarqube_db_name: "{{ postgresql_db_name }}"
sonarqube_db_host: "localhost"

# JVM tuning
sonarqube_web_jvm_opts: "-Xmx512m -Xms128m"
sonarqube_ce_jvm_opts: "-Xmx512m -Xms128m"
