---
- name: Assert supported OS
  ansible.builtin.assert:
    that:
      - ansible_facts['distribution'] in ['CentOS', 'Amazon']
    fail_msg: >
      Unsupported OS: {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_major_version'] }}.
      Supported: CentOS Stream 9, Amazon Linux 2023.

#  CentOS Stream 9 → EL9 repo 
- name: Set PostgreSQL repo RPM for CentOS Stream 9
  ansible.builtin.set_fact:
    postgresql_repo_rpm: "{{ postgresql_repo_rpm_el9 }}"
    java_packages:
      - java-17-openjdk
      - java-17-openjdk-devel
    disable_pg_module: true    # CentOS has built-in pg module to disable
  when:
    - ansible_facts['distribution'] == 'CentOS'

#  Amazon Linux 2023 → EL9 repo 
- name: Set PostgreSQL repo RPM for Amazon Linux 2023
  ansible.builtin.set_fact:
    postgresql_repo_rpm: "{{ postgresql_repo_rpm_el9 }}"
    java_packages:
      - java-17-amazon-corretto          # preferred on Amazon Linux
      - java-17-amazon-corretto-devel
    disable_pg_module: false   # AL2023 doesn't use DNF modules the same way
  when:
    - ansible_facts['distribution'] == 'Amazon'

- name: Show detected OS configuration
  ansible.builtin.debug:
    msg:
      - "OS: {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_major_version'] }}"
      - "PostgreSQL repo: {{ postgresql_repo_rpm }}"
      - "Java packages: {{ java_packages }}"
