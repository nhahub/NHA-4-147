---
# Dependencies
- name: Install unzip and Java (OS-specific package list)
  ansible.builtin.dnf:
    name: "{{ ['unzip'] + java_packages }}"
    state: present

# User and group
- name: Create sonarqube group
  ansible.builtin.group:
    name: "{{ sonarqube_group }}"
    state: present

- name: Create sonarqube system user
  ansible.builtin.user:
    name: "{{ sonarqube_user }}"
    group: "{{ sonarqube_group }}"
    home: "{{ sonarqube_install_dir }}"
    shell: /bin/false
    system: true
    state: present

# التحقق الذكي من وجود الإعدادات
- name: Check if SonarQube configuration directory exists
  ansible.builtin.stat:
    path: "{{ sonarqube_install_dir }}/conf"
  register: sonarqube_conf_dir

# تنظيف مخلفات أي محاولة قديمة معطوبة تلقائياً
- name: Clean up incomplete previous installation attempts
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  with_items:
    - "/tmp/sonarqube.zip"
    - "/opt/sonarqube-{{ sonarqube_version }}"
    - "{{ sonarqube_install_dir }}"
  when: not sonarqube_conf_dir.stat.exists

# التحميل والفك
- name: Download SonarQube zip
  ansible.builtin.get_url:
    url: "{{ sonarqube_download_url }}"
    dest: "/tmp/sonarqube.zip"
    mode: "0644"
  when: not sonarqube_conf_dir.stat.exists

- name: Extract SonarQube to /opt
  ansible.builtin.unarchive:
    src: "/tmp/sonarqube.zip"
    dest: "/opt"
    remote_src: true
  when: not sonarqube_conf_dir.stat.exists

- name: Move extracted directory to install path
  ansible.builtin.command:
    cmd: "mv /opt/sonarqube-{{ sonarqube_version }} {{ sonarqube_install_dir }}"
    creates: "{{ sonarqube_install_dir }}"
  when: not sonarqube_conf_dir.stat.exists

# إعدادات النظام ومحرك البحث
- name: Set vm.max_map_count for Elasticsearch
  ansible.posix.sysctl:
    name: vm.max_map_count
    value: "262144"
    state: present
    reload: true

- name: Create SonarQube data directory
  ansible.builtin.file:
    path: "{{ sonarqube_data_dir }}"
    state: directory
    owner: "{{ sonarqube_user }}"
    group: "{{ sonarqube_group }}"
    mode: "0755"

# تطبيق الملكية الكاملة والشاملة على كافة مجلدات السونار (بما فيها logs و temp)
- name: Set ownership on install directory and all subfolders
  ansible.builtin.file:
    path: "{{ sonarqube_install_dir }}"
    state: directory
    owner: "{{ sonarqube_user }}"
    group: "{{ sonarqube_group }}"
    recurse: true

# نقل ملفات الإعدادات والخدمة من الـ Templates
- name: Deploy sonar.properties from template
  ansible.builtin.template:
    src: sonar.properties.j2
    dest: "{{ sonarqube_install_dir }}/conf/sonar.properties"
    owner: "{{ sonarqube_user }}"
    group: "{{ sonarqube_group }}"
    mode: "0640"
  notify: restart sonarqube

- name: Deploy sonarqube systemd service from template
  ansible.builtin.template:
    src: sonarqube.service.j2
    dest: /etc/systemd/system/sonarqube.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart sonarqube

- name: Flush handlers before starting service
  ansible.builtin.meta: flush_handlers

# فتح منفذ 9000 في جدار الحماية الداخلي للسيرفر إن وجد لتأمين الوصول الخارجي
- name: Ensure Port 9000 is open in OS firewall
  ansible.builtin.firewalld:
    port: 9000/tcp
    permanent: true
    state: enabled
    immediate: true
  failed_when: false

# تشغيل وإعادة تشغيل الخدمة بشكل نظيف بالمتغيرات الجديدة
- name: Enable and start SonarQube service
  ansible.builtin.service:
    name: sonarqube
    state: restarted
    enabled: true

# الانتظار الذكي (5 دقائق) للتأكد من قيام الـ Web Server وربطه بالداتابيز بنجاح
- name: Wait for SonarQube Web Server to fully bind on port 9000
  ansible.builtin.wait_for:
    host: 0.0.0.0
    port: 9000
    timeout: 300
    delay: 15

# طباعة النتيجة النهائية للوصول الخارجي بالـ Public IP
- name: Display SonarQube access information
  ansible.builtin.debug:
    msg:
      - "================================================"
      - "SonarQube is fully up and running permanently!"
      - "Access URL: http://34.201.205.190:9000"
      - "Username:   admin"
      - "Password:   admin"
      - "================================================"
