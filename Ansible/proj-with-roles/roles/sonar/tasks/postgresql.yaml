---
# 1. تثبيت مستودع PGDG الخارجي (يتم تشغيله فقط لـ CentOS ويتخطى Amazon Linux)
- name: Install PostgreSQL PGDG repository
  ansible.builtin.dnf:
    name: "{{ postgresql_repo_rpm }}"
    state: present
    disable_gpg_check: true
  when: postgresql_repo_rpm is defined and postgresql_repo_rpm != ""

# 2. تعطيل الـ PostgreSQL module المدمج (مطلوب فقط في CentOS لتجنب تعارض الحزم)
- name: Disable default PostgreSQL module (CentOS only)
  ansible.builtin.command:
    cmd: dnf -y module disable postgresql
  register: disable_module_result
  changed_when: "'Disabling modules' in disable_module_result.stdout"
  when: disable_pg_module | bool

# 3. تنظيف وتحديث بيانات الـ DNF لضمان قراءة الحزم بشكل صحيح
- name: Clean DNF cache
  ansible.builtin.command:
    cmd: dnf clean all
  changed_when: false

- name: Refresh DNF metadata
  ansible.builtin.command:
    cmd: dnf makecache
  changed_when: false

# 4. تثبيت حزم الـ Java المحددة ديناميكياً بناءً على نوع النظام
- name: Install Java packages
  ansible.builtin.dnf:
    name: "{{ java_packages }}"
    state: present

# 5. تثبيت حزم PostgreSQL
- name: Install PostgreSQL packages
  ansible.builtin.dnf:
    name:
      - "postgresql{{ postgresql_version }}"
      - "postgresql{{ postgresql_version }}-server"
      - "postgresql{{ postgresql_version }}-contrib"
    state: present

# 6. التحقق مما إذا كانت قاعدة البيانات قد تم تهيئتها مسبقاً
- name: Check if PostgreSQL database is initialized
  ansible.builtin.stat:
    path: "{{ '/var/lib/pgsql/' + postgresql_version + '/data/PG_VERSION' if ansible_facts['distribution'] == 'CentOS' else '/var/lib/pgsql/data/PG_VERSION' }}"
  register: pg_data_version

# 7. تهيئة قاعدة البيانات لأول مرة
- name: Initialize PostgreSQL database
  ansible.builtin.command:
    cmd: "{{ '/usr/bin/postgresql' + postgresql_version + '-setup initdb' if ansible_facts['distribution'] == 'CentOS' else '/usr/bin/initdb -D /var/lib/pgsql/data' }}"
  become: true
  become_user: postgres
  when: not pg_data_version.stat.exists

# 8. تفعيل وبدء خدمة PostgreSQL
- name: Enable and start PostgreSQL service
  ansible.builtin.systemd:
    name: "{{ 'postgresql-' + postgresql_version if ansible_facts['distribution'] == 'CentOS' else 'postgresql' }}"
    state: started
    enabled: true

# 9. تكوين صلاحيات الاتصال المحلي (تعديل pg_hba.conf لـ md5)
- name: Configure md5 authentication for local connections
  ansible.builtin.lineinfile:
    path: "{{ '/var/lib/pgsql/' + postgresql_version + '/data/pg_hba.conf' if ansible_facts['distribution'] == 'CentOS' else '/var/lib/pgsql/data/pg_hba.conf' }}"
    regexp: '^host\s+all\s+all\s+127\.0\.0\.1/32\s+ident'
    line: "host    all             all             127.0.0.1/32            md5"
  notify: restart postgresql

- name: Flush postgresql handlers immediately
  ansible.builtin.meta: flush_handlers

# 10. إنشاء مستخدم وقاعدة بيانات SonarQube تلقائياً عبر SQL المباشر
- name: Create SonarQube Database User
  ansible.builtin.command:
    cmd: 'psql -c "CREATE USER {{ sonarqube_db_user }} WITH PASSWORD ''{{ sonarqube_db_pass }}'';"'
  become: true
  become_user: postgres
  register: create_user_res
  failed_when: false
  changed_when: "'CREATE ROLE' in create_user_res.stdout"

- name: Create SonarQube Database
  ansible.builtin.command:
    cmd: 'psql -c "CREATE DATABASE {{ sonarqube_db_name }} OWNER {{ sonarqube_db_user }};"'
  become: true
  become_user: postgres
  register: create_db_res
  failed_when: false
  changed_when: "'CREATE DATABASE' in create_db_res.stdout"
