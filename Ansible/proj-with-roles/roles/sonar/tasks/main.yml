---
# tasks file for Ansible/proj-with-roles/roles/sonar

# Installs and configures PostgreSQL on CentOS/RHEL

- name : install yum repo for postgresql
  dnf:
    name: "{{ postgresql_repo_rpm }}"
    state: present
    update_cache: true
    disable_gpg_check: true

- name: Disable built-in postgresql module (conflicts with PGDG)
  ansible.builtin.command:
    cmd: dnf -qy module disable postgresql

- name: Clean DNF cache
  ansible.builtin.command:
    cmd: dnf clean all
  changed_when: false

- name: Refresh DNF metadata cache
  ansible.builtin.command:
    cmd: dnf makecache
  changed_when: false

- name: Install PostgreSQL 16 packages
  ansible.builtin.dnf:
    name:
      - "postgresql{{ postgresql_version }}"
      - "postgresql{{ postgresql_version }}-server"
      - "postgresql{{ postgresql_version }}-contrib"
    state: present



- name: Initialize PostgreSQL database cluster
  ansible.builtin.command:
    cmd: "{{ postgresql_bin_dir }}/initdb -D {{ postgresql_data_dir }}"
  become: true
  become_user: postgres



- name: Allow PostgreSQL to listen on all interfaces
  ansible.builtin.lineinfile:
    path: "{{ postgresql_data_dir }}/postgresql.conf"
    regexp: "^#?listen_addresses.*"
    line: "listen_addresses = '*'"
  notify: restart postgresql



#  configure pg_hba.conf 
- name: Add new configuration to "pg_hba.conf"
  blockinfile:
    dest: "{{ postgresql_data_dir }}/pg_hba.conf"
    block: |
      host    all             all             0.0.0.0/0                md5
      host    all             all             ::/0                     md5
  notify: restart postgresql


#  enable and start service 
- name: Enable and start PostgreSQL service
  ansible.builtin.service:
    name: "{{ postgresql_service }}"
    state: started
    enabled: true

- name: Wait for PostgreSQL to be ready on port 5432
  ansible.builtin.wait_for:
    host: localhost
    port: 5432
    timeout: 60



#  reload config (equivalent to SELECT pg_reload_conf()) 
- name: Reload PostgreSQL configuration
  ansible.builtin.command:
    cmd: "{{ postgresql_bin_dir }}/pg_ctl reload -D {{ postgresql_data_dir }}"
  become: true
  become_user: postgres
  changed_when: false

#  create database and user 
- name: Create SonarQube database
  ansible.builtin.command:
    cmd: psql -c "CREATE DATABASE {{ postgresql_db_name }};"
  become: true
  become_user: postgres
  register: create_db
  failed_when:
    - create_db.rc != 0
    - '"already exists" not in create_db.stderr'
  changed_when: '"already exists" not in create_db.stderr'



- name: Create SonarQube database user
  ansible.builtin.command:
    cmd: psql -c "CREATE USER {{ postgresql_db_user }} WITH ENCRYPTED PASSWORD '{{ postgresql_db_pass }}';"
  become: true
  become_user: postgres
  register: create_user
  failed_when:
    - create_user.rc != 0
    - '"already exists" not in create_user.stderr'
  changed_when: '"already exists" not in create_user.stderr'

- name: Grant all privileges on database to user
  ansible.builtin.command:
    cmd: psql -c "GRANT ALL PRIVILEGES ON DATABASE {{ postgresql_db_name }} TO {{ postgresql_db_user }};"
  become: true
  become_user: postgres
  changed_when: false

- name: Set database owner to SonarQube user
  ansible.builtin.command:
    cmd: psql -c "ALTER DATABASE {{ postgresql_db_name }} OWNER TO {{ postgresql_db_user }};"
  become: true
  become_user: postgres
  changed_when: false



  #========================================

# install and configure SonarQube on CentOS/RHEL

- name: Install dependencies (unzip, java 17)
  yum:
    name:
      - unzip
      - java-17-openjdk
      - java-17-openjdk-devel
    state: present

- name: Check if SonarQube is already installed
  ansible.builtin.stat:
    path: "{{ sonarqube_install_dir }}/bin/linux-x86-64/sonar.sh"
  register: sonarqube_binary

- name : install sonar - block  of tasks 
  block:

  - name: Download SonarQube zip
    ansible.builtin.get_url:
      url: "{{ sonarqube_download_url }}"
      dest: "/tmp/sonarqube.zip"
      mode: '0644'

  - name: Extract SonarQube to /opt
    ansible.builtin.unarchive:
      src: "/tmp/sonarqube.zip"
      dest: "/opt"
      remote_src: yes

  - name: Move extracted directory to install path
    ansible.builtin.command:
      cmd: "mv /opt/sonarqube-{{ sonarqube_version }} {{ sonarqube_install_dir }}"
      creates: "{{ sonarqube_install_dir }}"   # only runs if dest doesn't exist

  when: not sonarqube_binary.stat.exists

- name: Create sonarqube group
  ansible.builtin.group:
    name: "{{ sonarqube_group }}"
    state: present

- name: Create sonarqube system user
  ansible.builtin.user:
    name: "{{ sonarqube_user }}"
    group: "{{ sonarqube_group }}"
    home: "{{ sonarqube_install_dir }}"
    shell: /bin/false
    system: yes
    state: present



- name: Set vm.max_map_count for Elasticsearch
  ansible.posix.sysctl:
    name: vm.max_map_count
    value: "262144"
    state: present
    reload: yes

- name: Create SonarQube data directory
  ansible.builtin.file:
    path: "{{ sonarqube_data_dir }}"
    state: directory
    owner: "{{ sonarqube_user }}"
    group: "{{ sonarqube_group }}"
    mode: '0755'

- name: Set ownership on install directory
  ansible.builtin.file:
    path: "{{ sonarqube_install_dir }}"
    state: directory
    owner: "{{ sonarqube_user }}"
    group: "{{ sonarqube_group }}"
    recurse: yes

- name: Deploy sonar.properties from template
  ansible.builtin.template:
    src: sonar.properties.j2
    dest: "{{ sonarqube_install_dir }}/conf/sonar.properties"
    owner: "{{ sonarqube_user }}"
    group: "{{ sonarqube_group }}"
    mode: '0640'
  notify: restart sonarqube




- name: Deploy sonarqube systemd service from template
  ansible.builtin.template:
    src: sonarqube.service.j2
    dest: /etc/systemd/system/sonarqube.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - reload systemd
    - restart sonarqube


    

#  start_sonarqube() 
- name: Start sonarqube service
  ansible.builtin.service:
    name: sonarqube
    state: started
    enabled: true

- name: Wait for SonarQube to be accessible on port 9000
  ansible.builtin.wait_for:
    host: localhost
    port: 9000
    timeout: 120
    delay: 10

#  display_access_information() 
- name: Display SonarQube access information
  ansible.builtin.debug:
    msg:
      - "================================================"
      - "SonarQube is up and running!"
      - "URL:      http://{{ ansible_facts['default_ipv4']['address'] }}:9000"
      - "Username: admin"
      - "Password: admin"
      - "================================================"
