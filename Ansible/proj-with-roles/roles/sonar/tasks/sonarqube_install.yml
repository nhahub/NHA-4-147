---
- name: Check if this SonarQube version is already unpacked
  ansible.builtin.stat:
    path: "{{ sonarqube_versioned_dir }}"
  register: sonarqube_dir_check

- name: Download SonarQube {{ sonarqube_version }}
  ansible.builtin.get_url:
    url: "{{ sonarqube_download_url }}"
    dest: "{{ sonarqube_download_dest }}"
    mode: "0644"
    timeout: 120
  when: not sonarqube_dir_check.stat.exists
  register: sonarqube_download
  retries: 3
  delay: 10
  until: sonarqube_download is succeeded

- name: Unzip SonarQube into {{ sonarqube_base_dir }}
  ansible.builtin.unarchive:
    src: "{{ sonarqube_download_dest }}"
    dest: "{{ sonarqube_base_dir }}"
    remote_src: true
    creates: "{{ sonarqube_versioned_dir }}"

- name: Point stable symlink {{ sonarqube_install_dir }} at the versioned directory
  ansible.builtin.file:
    src: "{{ sonarqube_versioned_dir }}"
    dest: "{{ sonarqube_install_dir }}"
    state: link
    force: true

- name: Remove downloaded archive to save disk space
  ansible.builtin.file:
    path: "{{ sonarqube_download_dest }}"
    state: absent

- name: Ensure required SonarQube subdirectories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ sonarqube_user }}"
    group: "{{ sonarqube_group }}"
    mode: "0750"
  loop:
    - "{{ sonarqube_data_dir }}"
    - "{{ sonarqube_temp_dir }}"
    - "{{ sonarqube_logs_dir }}"
    - "{{ sonarqube_extensions_dir }}"

- name: Set ownership on the whole SonarQube install (versioned dir, target of symlink)
  ansible.builtin.file:
    path: "{{ sonarqube_versioned_dir }}"
    owner: "{{ sonarqube_user }}"
    group: "{{ sonarqube_group }}"
    recurse: true

- name: Deploy sonar.properties with DB connection details
  ansible.builtin.template:
    src: sonar.properties.j2
    dest: "{{ sonarqube_install_dir }}/conf/sonar.properties"
    owner: "{{ sonarqube_user }}"
    group: "{{ sonarqube_group }}"
    mode: "0640"
  notify: restart sonarqube

- name: Set JAVA_HOME for SonarQube's wrapper script
  ansible.builtin.lineinfile:
    path: "{{ sonarqube_install_dir }}/bin/linux-x86-64/sonar.sh"
    insertafter: '^#!/.*'
    regexp: '^export JAVA_HOME='
    line: "export JAVA_HOME={{ java_home }}"
    state: present
  notify: restart sonarqube
