---
# -----------------------------------------------------------------------------
# Install PostgreSQL server (path differs between AL2 and AL2023)
# -----------------------------------------------------------------------------
- name: Install PostgreSQL {{ postgresql_version }} (Amazon Linux 2023)
  ansible.builtin.package:
    name:
      - "postgresql{{ postgresql_version }}-server"
      - "postgresql{{ postgresql_version }}"
      - python3-psycopg2
    state: present
  when: ansible_facts['distribution_major_version'] == "2023"

- name: Enable PostgreSQL {{ postgresql_version }} extras topic (Amazon Linux 2)
  ansible.builtin.command: "amazon-linux-extras enable postgresql{{ postgresql_version }}"
  args:
    creates: "/etc/yum.repos.d/*postgresql{{ postgresql_version }}*"
  when: ansible_facts['distribution_major_version'] == "2"
  changed_when: true

- name: Install PostgreSQL server (Amazon Linux 2)
  ansible.builtin.package:
    name:
      - postgresql-server
      - postgresql
      - python3-psycopg2
    state: present
  when: ansible_facts['distribution_major_version'] == "2"

# -----------------------------------------------------------------------------
# Initialize the database cluster (only runs once - checked via data dir marker)
# -----------------------------------------------------------------------------
- name: Check whether PostgreSQL data directory is already initialized
  ansible.builtin.stat:
    path: "{{ postgresql_data_dir }}/PG_VERSION"
  register: pg_initialized

- name: Initialize PostgreSQL database cluster
  ansible.builtin.command: "{{ postgresql_setup_bin }} --initdb"
  when: not pg_initialized.stat.exists
  become: true
  become_user: root
  register: pg_initdb
  changed_when: "'is initialized' in pg_initdb.stdout or pg_initdb.rc == 0"

# -----------------------------------------------------------------------------
# Configuration: listen address + auth method for the sonarqube DB user
# -----------------------------------------------------------------------------
- name: Set listen_addresses in postgresql.conf
  ansible.builtin.lineinfile:
    path: "{{ postgresql_data_dir }}/postgresql.conf"
    regexp: '^#?listen_addresses\s*='
    line: "listen_addresses = '{{ postgresql_listen_addresses }}'"
    state: present
  notify: restart postgresql

- name: Set port in postgresql.conf
  ansible.builtin.lineinfile:
    path: "{{ postgresql_data_dir }}/postgresql.conf"
    regexp: '^#?port\s*='
    line: "port = {{ postgresql_port }}"
    state: present
  notify: restart postgresql

- name: Allow md5-authenticated local TCP connections for the sonar DB (pg_hba.conf)
  ansible.builtin.blockinfile:
    path: "{{ postgresql_data_dir }}/pg_hba.conf"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - sonarqube"
    insertafter: EOF
    block: |
      host    {{ sonar_db_name }}    {{ sonar_db_user }}    127.0.0.1/32    md5
      host    {{ sonar_db_name }}    {{ sonar_db_user }}    ::1/128         md5
  notify: restart postgresql

- name: Ensure PostgreSQL is enabled and started
  ansible.builtin.systemd:
    name: "{{ postgresql_service_name }}"
    enabled: true
    state: started

- name: Flush handlers now so pg_hba/config changes are live before creating the DB
  ansible.builtin.meta: flush_handlers

# -----------------------------------------------------------------------------
# Create the SonarQube database and role
# -----------------------------------------------------------------------------
- name: Create SonarQube database user/role
  become: true
  become_user: postgres
  community.postgresql.postgresql_user:
    name: "{{ sonar_db_user }}"
    password: "{{ sonar_db_password }}"
    encrypted: true
    role_attr_flags: LOGIN
    state: present

- name: Create SonarQube database
  become: true
  become_user: postgres
  community.postgresql.postgresql_db:
    name: "{{ sonar_db_name }}"
    owner: "{{ sonar_db_user }}"
    encoding: UTF-8
    state: present

- name: Grant all privileges on the SonarQube database to the sonar user
  become: true
  become_user: postgres
  community.postgresql.postgresql_privs:
    database: "{{ sonar_db_name }}"
    roles: "{{ sonar_db_user }}"
    type: database
    privs: ALL
    state: present
