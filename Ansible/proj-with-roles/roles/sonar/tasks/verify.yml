---
- name: Query SonarQube system status API
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ sonarqube_port }}/api/system/status"
    return_content: true
    status_code: 200
  register: sonar_status
  retries: 20
  delay: 10
  until: sonar_status.status == 200 and (sonar_status.json.status | default('')) in ['UP', 'STARTING', 'DB_MIGRATION_NEEDED']

- name: Report SonarQube status
  ansible.builtin.debug:
    msg: >
      SonarQube reports status "{{ sonar_status.json.status }}".
      If this isn't "UP" yet, it is normal right after first boot while
      Elasticsearch/Compute Engine finish initializing - check
      {{ sonarqube_logs_dir }}/sonar.log after a couple more minutes.

- name: Fail loudly if SonarQube reports an ERROR state
  ansible.builtin.fail:
    msg: >
      SonarQube reported status "{{ sonar_status.json.status }}". Check
      {{ sonarqube_logs_dir }}/sonar.log, {{ sonarqube_logs_dir }}/es.log and
      {{ sonarqube_logs_dir }}/ce.log on the target host for details.
  when: sonar_status.json.status is defined and sonar_status.json.status == "ERROR"
