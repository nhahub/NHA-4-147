---
- name: Install containerd and docker on Amazon Linux 2023
  ansible.builtin.dnf:
    name:
      - containerd
      - docker
    state: present
    update_cache: true

- name: Enable and start Docker service
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Create docker group
  ansible.builtin.group:
    name: docker
    state: present

- name: Add user to docker group
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true

# newgrp docker is interactive — reset SSH connection instead
- name: Reset SSH connection to apply group membership
  ansible.builtin.meta: reset_connection

# verify versions -> no conflicts
- name: Get Docker version
  ansible.builtin.command:
    cmd: docker --version
  register: docker_version
  changed_when: false

- name: Get containerd version
  ansible.builtin.command:
    cmd: containerd --version
  register: containerd_version
  changed_when: false

- name: Show installed versions
  ansible.builtin.debug:
    msg:
      - "{{ containerd_version.stdout }}"
      - "{{ docker_version.stdout }}"
      - "User '{{ ansible_user }}' added to docker group"
