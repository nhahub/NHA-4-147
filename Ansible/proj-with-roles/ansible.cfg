[defaults]
#make it read all files in this directory
private_key_file = ~/.ssh/private_key.pem

inventory = /mnt/c/Users/Mina/Desktop/My-Github/NHA-4-147/Ansible/proj-with-roles/inventory/instance.aws_ec2.yaml

host_key_checking = False
host_key_checking = False
retry_files_enabled = False
stdout_callback = yaml
forks           = 5
timeout         = 30

interpreter_python = auto_silent

