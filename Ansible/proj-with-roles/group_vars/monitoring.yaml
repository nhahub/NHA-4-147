---
# Prometheus 
prometheus_storage_retention: "15d"

prometheus_scrape_configs:
  - job_name: "node_exporter"
    static_configs:
      - targets:
          - "192.168.163.144:9100"   # k8s-master
          - "192.168.163.143:9100"   # monitoring server itself

  - job_name: "prometheus"
    static_configs:
      - targets:
          - "localhost:9090"

#  Alertmanager 
alertmanager_receivers:
  - name: "default"

alertmanager_route:
  receiver: "default"




#  Grafana 
grafana_ini:
  security:
    admin_user: admin
    admin_password: "admin123"
  server:
    http_port: 3000

grafana_datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: "http://localhost:9090"
    is_default: true
    basic_auth: false

  - name: Loki
    type: loki
    access: proxy
    url: "http://localhost:3100"
    basic_auth: false


#  Loki 
loki_version: "3.5.8"
loki_http_listen_port: 3100
loki_storage_path: "/var/lib/loki"

#  Promtail 
promtail_clients:
  - url: "http://{{ monitoring_server_ip }}:3100/loki/api/v1/push"