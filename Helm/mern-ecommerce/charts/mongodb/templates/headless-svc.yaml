apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-mongo-svc-headless
  namespace: {{ .Values.mongodb_ns | default "mongodb-proj-ns"}}
  labels:
    name:  {{ .Release.Name }}-mongo-svc

spec:
  ports:
    - port: 27017
      targetPort: 27017

  clusterIP: None ## headless service 

  selector:
  {{- include "mongodb.labels" . | nindent 4 }}
